server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/recruitment_ai?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:ir-data-system-jwt-secret-key-2024}
  expiration: 86400000  # 24 hours

llm:
  provider: openai  # openai / volcengine / bailian
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: gpt-3.5-turbo
  volcengine:
    api-key: ${ARK_API_KEY:}
    base-url: https://ark.cn-beijing.volces.com/api/v3
    endpoint-id: ${ARK_ENDPOINT_ID:}
  bailian:
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus

ml:
  service:
    url: http://127.0.0.1:8000/api/ml  # Python FastAPI 推理服务地址
